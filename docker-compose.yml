name: rently-content-agent

# n8n self-hosted, single-service stack.
# Uses n8n's built-in SQLite for state (workflows, credentials, executions).
# The DB lives inside the n8n_data volume — back it up with the volume.
#
# Same file works for local and prod. Environment-specific values live in .env.
# n8n binds to 127.0.0.1:5678 only — never exposed directly to the public
# internet. In production, the host's web server (nginx/apache) reverse-
# proxies n8n.yourdomain.com → 127.0.0.1:5678 and handles TLS via certbot.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      # When a reverse proxy is in front (production), trust X-Forwarded-*
      # so n8n generates correct URLs and respects HTTPS context.
      N8N_PROXY_HOPS: "1"
      # Allow $env.NAME access from workflow expressions. n8n blocks this by
      # default for safety. We allow it because all sensitive values come
      # from .env (never typed into the workflow JSON in git).
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Whitelist /data/prompts so Read/Write File nodes can load the brand
      # voice + topics catalog. n8n defaults to /home/node/.n8n-files only;
      # we add ours alongside (semicolon-separated).
      N8N_RESTRICT_FILE_ACCESS_TO: "/home/node/.n8n-files;/data/prompts"
      # Workflow config — referenced via $env.NAME in workflow expressions
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      FB_PAGE_ID: ${FB_PAGE_ID}
      IG_BUSINESS_ACCOUNT_ID: ${IG_BUSINESS_ACCOUNT_ID}
      # Supabase Storage — hosts post images at a public HTTPS URL so Meta
      # (FB/IG) can fetch them. IG only accepts image_url, not binary upload.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Groq — same key the n8n credential uses, also exposed to env so
      # Compose preview's inline IG-rewrite call (Code node, no credential
      # binding) can read it via $env.GROQ_API_KEY.
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Cloudflare Workers AI token — image generation nodes auth from env
      # instead of an n8n credential, so re-imports need no credential picking.
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      # Long-lived FB User token (seed). The "Get FB page token" node derives a
      # fresh Page token from it on every publish, so the Page token never
      # goes stale. Generate once (Graph Explorer → long-lived exchange);
      # active posting keeps its 90-day data-access window alive.
      FB_USER_TOKEN: ${FB_USER_TOKEN}
    volumes:
      - n8n_data:/home/node/.n8n
      # Brand voice + topic catalog. Read by the workflow at runtime via
      # the Read brand voice and Read topics nodes. Mounted read-only since
      # the workflow never writes back.
      - ./prompts:/data/prompts:ro

volumes:
  n8n_data:
